<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課題カレンダー</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

  <div class="p-4 max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-6 border-b pb-4">
      <h1 class="text-lg font-bold tracking-tight text-gray-800">課題ダッシュボード</h1>
      <span id="group-tag" class="bg-gray-200 text-gray-600 text-xs px-2 py-1 rounded">読み込み中</span>
    </header>
    
    <div id="calendar" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAFrehcz96W-wPS3-1ibSZpaPMefxHFHG0",
      authDomain: "zyohokagakucale.firebaseapp.com",
      projectId: "zyohokagakucale",
      storageBucket: "zyohokagakucale.firebasestorage.app",
      messagingSenderId: "261465620234",
      appId: "1:261465620234:web:673d61758162d9009f04f3",
      measurementId: "G-PW8S7FHC19"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    liff.init({ liffId: "2010567491-tcVJc1Jt" }).then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      
      const context = liff.getContext();
      const userId = context.userId;

      db.collection("users").doc(userId).get().then((userDoc) => {
        if (!userDoc.exists) {
          alert("グループ情報が見つかりません。LINEから初期設定を行ってください。");
          return;
        }
        
        const userData = userDoc.data();
        const groupId = userData.groupId;
        
        document.getElementById("group-tag").innerText = `GROUP ID: ${groupId}`;

        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'ja',
          headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek'
          },
          events: []
        });
        calendar.render();

        // フィルターを外してグループに紐づくすべての課題をカレンダーにリアルタイムマッピング
        db.collection("groups").doc(groupId).collection("assignments")
          .onSnapshot((snapshot) => {
            const events = [];
            snapshot.forEach((doc) => {
              const data = doc.data();
              const datePart = data.deadline ? data.deadline.split(" ")[0] : null;
              if (datePart) {
                events.push({
                  title: `[${data.subject}] ${data.title}`,
                  start: datePart, 
                  color: '#e11d48' 
                });
              }
            });
            calendar.removeAllEvents();
            calendar.addEventSource(events);
          }, (error) => {
            alert("データ同期エラー: " + error.message);
          });

      }).catch((err) => {
        alert("ユーザー情報の取得に失敗しました: " + err.message);
      });
    }).catch((err) => {
      alert("LIFFの起動に失敗しました: " + err.message);
    });
  </script>
</body>
</html>
