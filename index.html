<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="theme-color" content="#E8590C">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>課題カレンダー</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #FFFFFF;
      --bg-subtle: #FAF9F8;
      --ink: #1C1B1A;
      --ink-muted: #6B6B6B;
      --orange: #E8590C;
      --orange-deep: #C2410C;
      --line: #E6E2DD;
      --calendar-height: 34vh;
    }

    * { box-sizing: border-box; font-family: 'Zen Kaku Gothic New', -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif; }
    .font-num { font-family: 'JetBrains Mono', monospace; }

    html, body { background: var(--bg); margin: 0; height: 100%; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }

    body { font-size: 15px; color: var(--ink); }

    .fc { font-size: 0.95rem !important; }
    .fc .fc-toolbar-title { font-size: 1.05rem !important; font-weight: 900; color: var(--ink); }
    .fc .fc-button { padding: 0.35rem 0.7rem !important; font-size: 0.78rem !important; background-color: #fff !important; color: var(--ink) !important; border: 1px solid var(--line) !important; border-radius: 6px !important; box-shadow: none !important; }
    .fc-daygrid-event { padding: 3px 6px !important; margin-top: 4px !important; font-size: 0.78rem !important; border-radius: 6px !important; line-height: 1.2 !important; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background-color: var(--orange) !important; border: none !important; font-weight: 800; }

    header { padding: 12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--line); background:var(--bg); }
    header h1 { margin:0; font-size:16px; font-weight:900; }
    header p { margin:0; font-size:12px; color:var(--ink-muted); }

    main { display:flex; flex-direction:column; height: calc(100vh - 56px); overflow:hidden; }
    .calendar-wrap { height: var(--calendar-height); padding:10px 12px; border-bottom:1px solid var(--line); background:var(--bg); }
    .list-wrap { flex:1; padding:14px; background:var(--bg-subtle); overflow:auto; }

    .card { background:#fff; border:1px solid var(--line); padding:12px; border-left:6px solid var(--orange); border-radius:8px; margin-bottom:10px; }
    .card-today { background:#fff; border:2px solid var(--orange-deep); padding:14px; border-left:8px solid var(--orange-deep); border-radius:10px; margin-bottom:12px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
    .tag { display:inline-block; padding:6px 10px; background:#fff6f0; color:var(--orange-deep); font-weight:800; font-size:12px; border-radius:6px; }
    .time { font-family:'JetBrains Mono', monospace; font-weight:700; color:var(--ink); font-size:13px; }

    .muted { color:var(--ink-muted); font-size:13px; }

    @media (max-width: 420px) {
      body { font-size: 16px; }
      :root { --calendar-height: 32vh; }
      .fc-daygrid-event { font-size: 0.9rem !important; padding: 5px 8px !important; }
      header h1 { font-size: 15px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>課題カレンダー</h1>
      <p id="group-tag" class="font-num">読み込み中</p>
    </div>
    <div class="font-num" style="font-size:11px; padding:6px 8px; border:1px solid var(--orange); color:var(--orange-deep); font-weight:700;">スマホ版</div>
  </header>

  <main>
    <div class="calendar-wrap">
      <div id="calendar" class="h-full"></div>
    </div>

    <div class="list-wrap">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h2 id="selected-date-title" class="muted" style="margin:0;">選択された日の課題</h2>
        <span id="task-count-badge" class="font-num" style="border:1px solid var(--orange); padding:6px 10px; color:var(--orange-deep); background:#fff; font-weight:800;">0件</span>
      </div>

      <div id="timeline-list" class="space-y-2">
        <p class="muted" style="text-align:center; padding:24px 0;">カレンダーの日付をタップすると、その日の課題が表示されます。</p>
      </div>
    </div>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAFrehcz96W-wPS3-1ibSZpaPMefxHFHG0",
      authDomain: "zyohokagakucale.firebaseapp.com",
      projectId: "zyohokagakucale",
      storageBucket: "zyohokagakucale.firebasestorage.app",
      messagingSenderId: "261465620234",
      appId: "1:261465620234:web:673d61758162d9009f04f3",
      measurementId: "G-PW8S7FHC19"
    };
    firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();

    let allAssignments = [];
    let pendingSnapshotTimer = null;
    let latestSnapshotData = null;
    let calendar = null;

    function showFatalError(message) {
      document.body.innerHTML = `
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg);">
          <div style="max-width:360px; width:100%; border:1px solid var(--orange); padding:16px; background:#fff6f0; text-align:center;">
            <p style="font-weight:800; color:var(--orange-deep); margin:0 0 8px 0;">読み込みに失敗しました</p>
            <p style="color:var(--ink-muted); font-size:13px; margin:0;">${message}</p>
          </div>
        </div>`;
    }

    function getEventDate(item) {
      if (item.date) return item.date;
      if (item.deadline) return item.deadline.split(" ")[0];
      return null;
    }

    function getTimeLabel(item) {
      if (item.allDay) return "終日";
      if (item.startTime && item.endTime) return `${item.startTime}〜${item.endTime}`;
      if (item.startTime) return `${item.startTime}〜`;
      if (item.deadline) {
        const t = item.deadline.split(" ")[1];
        return t ? `${t} 締切` : "終日";
      }
      return "終日";
    }

    function scheduleSnapshotUpdate(data) {
      latestSnapshotData = data;
      if (pendingSnapshotTimer) {
        clearTimeout(pendingSnapshotTimer);
      }
      pendingSnapshotTimer = setTimeout(() => {
        applySnapshotData(latestSnapshotData);
        pendingSnapshotTimer = null;
        latestSnapshotData = null;
      }, 300);
    }

    function applySnapshotData(snapshot) {
      allAssignments = [];
      const events = [];

      snapshot.forEach((doc) => {
        const data = doc.data();
        const dateStr = getEventDate(data);
        if (!dateStr) return;

        data._id = doc.id;
        allAssignments.push(data);

        events.push({
          title: data.subject || data.title || "予定",
          start: dateStr,
          allDay: true,
          color: (dateStr === (new Date().toISOString().split('T')[0])) ? '#C2410C' : '#E8590C'
        });
      });

      calendar.removeAllEvents();
      calendar.addEventSource(events);

      const todayStr = new Date().toISOString().split('T')[0];
      updateTimeline(todayStr);
    }

    liff.init({ liffId: "2010567491-tcVJc1Jt" }).then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const userId = liff.getContext().userId;

      firestore.collection("users").doc(userId).get().then((userDoc) => {
        if (!userDoc.exists) {
          document.getElementById("timeline-list").innerHTML =
            `<p style="color:var(--orange-deep); text-align:center; padding:12px 0;">LINE側で「グループ作成」または合言葉の登録を先に行ってください。</p>`;
          return;
        }

        const groupId = userDoc.data().groupId;
        document.getElementById("group-tag").innerText = `GROUP · ${groupId}`;

        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'ja',
          height: '100%',
          handleWindowResize: true,
          headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
          dayMaxEventRows: 3,
          dayMaxEvents: true,
          eventDisplay: 'block',
          dateClick: function (info) {
            updateTimeline(info.dateStr);
          }
        });
        calendar.render();

        firestore.collection("groups").doc(groupId).collection("assignments")
          .onSnapshot((snapshot) => {
            scheduleSnapshotUpdate(snapshot);
          }, (err) => {
            showFatalError("Firestore の購読に失敗しました（" + err.message + "）");
          });

      }).catch(err => showFatalError("Firestoreからユーザー情報を取得できませんでした（" + err.message + "）"));
    }).catch(err => showFatalError("LIFFの起動に失敗しました（" + err.message + "）"));

    function updateTimeline(dateStr) {
      const titleEl = document.getElementById("selected-date-title");
      const listEl = document.getElementById("timeline-list");
      const badgeEl = document.getElementById("task-count-badge");

      const parts = dateStr.split("-");
      titleEl.innerText = `${parseInt(parts[1], 10)}月${parseInt(parts[2], 10)}日の課題`;

      const filtered = allAssignments.filter(item => getEventDate(item) === dateStr);
      badgeEl.innerText = `${filtered.length}件`;

      const todayStr = new Date().toISOString().split('T')[0];
      const isToday = dateStr === todayStr;

      if (filtered.length === 0) {
        listEl.innerHTML = `<p class="muted" style="text-align:center; padding:32px 0;">この日の締め切りはありません。</p>`;
        return;
      }

      listEl.innerHTML = "";
      filtered.forEach(item => {
        const timeLabel = getTimeLabel(item);
        const tag = item.subject || item.type || "未設定";

        const contentHtml = item.content
          ? `<p style="color:var(--ink-muted); font-size:13px; margin-top:6px; line-height:1.4;">${escapeHtml(item.content)}</p>`
          : "";

        const div = document.createElement("div");
        div.className = isToday ? "card-today" : "card";

        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
            <span class="tag">${escapeHtml(tag)}</span>
            <span class="time">${escapeHtml(timeLabel)}</span>
          </div>
          <h3 style="margin:8px 0 0 0; font-weight:800; font-size:${isToday ? '18px' : '15px'};">${escapeHtml(item.title || "無題")}</h3>
          ${contentHtml}
        `;
        listEl.appendChild(div);
      });

      if (isToday) {
        listEl.scrollTop = 0;
      }
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>"'`=\/]/g, function(s) {
        return ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
          '/': '&#x2F;',
          '`': '&#x60;',
          '=': '&#x3D;'
        })[s];
      });
    }
  </script>
</body>
</html>
