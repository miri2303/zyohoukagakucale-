<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E8590C">
  <title>課題カレンダー</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #FFFFFF;
      --bg-subtle: #F5F4F1;
      --ink: #1C1B1A;
      --ink-muted: #7A756E;
      --orange: #E8590C;
      --orange-deep: #C2410C;
      --orange-pale: #FDECE1;
      --line: #E4E1DB;
    }

    * { font-family: 'Zen Kaku Gothic New', -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif; }
    .font-num { font-family: 'JetBrains Mono', 'Zen Kaku Gothic New', monospace; }

    html, body { background: var(--bg); }

    /* FullCalendar: 角を落として直線的に、オレンジ単色でまとめる */
    .fc { font-size: 0.75rem !important; }
    .fc .fc-toolbar-title {
      font-size: 1rem !important; font-weight: 900; color: var(--ink);
    }
    .fc .fc-button {
      padding: 0.3rem 0.6rem !important;
      font-size: 0.7rem !important;
      background-color: #fff !important;
      color: var(--ink) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    .fc .fc-button:hover { background-color: var(--orange-pale) !important; border-color: var(--orange) !important; }
    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background-color: var(--orange) !important;
      border-color: var(--orange) !important;
      color: #fff !important;
      box-shadow: none !important;
    }
    .fc-theme-standard td, .fc-theme-standard th { border-color: var(--line) !important; }
    .fc-daygrid-day-number { color: var(--ink); font-weight: 500; }
    .fc-col-header-cell-cushion { color: var(--ink-muted); font-weight: 700; font-size: 0.65rem; }
    .fc-day-today { background-color: var(--orange-pale) !important; }
    .fc-daygrid-event {
      padding: 1px 4px !important;
      margin-top: 2px !important;
      font-size: 0.62rem !important;
      border-radius: 0 !important;
      line-height: 1.3 !important;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      background-color: var(--orange) !important;
      border: none !important;
      font-weight: 700;
    }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden select-none" style="color: var(--ink);">

  <div style="height: 6px; background: var(--orange);" class="shrink-0"></div>

  <header class="px-4 py-3 flex justify-between items-center shrink-0 border-b-2" style="border-color: var(--orange); background: var(--bg);">
    <div>
      <h1 class="text-sm font-black tracking-wide">課題カレンダー</h1>
      <p id="group-tag" class="text-[10px] mt-0.5 font-num" style="color: var(--ink-muted);">読み込み中</p>
    </div>
    <div class="text-[10px] px-2 py-1 border font-bold tracking-wide" style="border-color: var(--orange); color: var(--orange-deep);">スマホ版</div>
  </header>

  <main class="flex-1 flex flex-col overflow-hidden">

    <div class="p-3 shrink-0 h-[48%] overflow-hidden border-b" style="background: var(--bg); border-color: var(--line);">
      <div id="calendar" class="h-full"></div>
    </div>

    <div class="flex-1 p-4 overflow-y-auto" style="background: var(--bg-subtle);">
      <div class="flex justify-between items-center mb-3">
        <h2 id="selected-date-title" class="text-xs font-bold tracking-wider" style="color: var(--ink-muted);">選択された日の課題</h2>
        <span id="task-count-badge" class="text-[10px] px-2 py-0.5 font-bold font-num border" style="border-color: var(--orange); color: var(--orange-deep); background: #fff;">0件</span>
      </div>

      <div id="timeline-list" class="space-y-2">
        <p class="text-xs text-center py-6" style="color: var(--ink-muted);">カレンダーの日付をタップすると、その日の課題が表示されます。</p>
      </div>
    </div>
  </main>

  <script>
    // Firebase設定（既存のトークンをそのまま使用）
    const firebaseConfig = {
      apiKey: "AIzaSyAFrehcz96W-wPS3-1ibSZpaPMefxHFHG0",
      authDomain: "zyohokagakucale.firebaseapp.com",
      projectId: "zyohokagakucale",
      storageBucket: "zyohokagakucale.firebasestorage.app",
      messagingSenderId: "261465620234",
      appId: "1:261465620234:web:673d61758162d9009f04f3",
      measurementId: "G-PW8S7FHC19"
    };
    firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();

    let allAssignments = [];

    // 読み込みに失敗した場合、alert() ではなく画面内にエラーを表示する
    function showFatalError(message) {
      document.body.innerHTML = `
        <div class="h-screen flex items-center justify-center p-6" style="background: var(--bg);">
          <div class="max-w-xs w-full border p-4 text-center" style="border-color: var(--orange); background: var(--orange-pale);">
            <p class="text-xs font-bold" style="color: var(--orange-deep);">読み込みに失敗しました</p>
            <p class="text-[11px] mt-2" style="color: var(--ink-muted);">${message}</p>
          </div>
        </div>`;
    }

    // 1件のデータから「日付(YYYY-MM-DD)」を取り出す
    // 新スキーマ: date / 旧スキーマ: deadline("YYYY-MM-DD HH:MM") の両方に対応
    function getEventDate(item) {
      if (item.date) return item.date;
      if (item.deadline) return item.deadline.split(" ")[0];
      return null;
    }

    // 1件のデータから「時刻表示」を組み立てる
    // 終日 / 時間帯（開始〜終了） / 単一締切時刻 の3パターンに対応
    function getTimeLabel(item) {
      if (item.allDay) return "終日";
      if (item.startTime && item.endTime) return `${item.startTime}〜${item.endTime}`;
      if (item.startTime) return `${item.startTime}〜`;
      if (item.deadline) {
        const t = item.deadline.split(" ")[1];
        return t ? `${t} 締切` : "終日";
      }
      return "終日";
    }

    liff.init({ liffId: "2010567491-tcVJc1Jt" }).then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const userId = liff.getContext().userId;

      firestore.collection("users").doc(userId).get().then((userDoc) => {
        if (!userDoc.exists) {
          document.getElementById("timeline-list").innerHTML =
            `<p class="text-xs text-center py-4" style="color: var(--orange-deep);">LINE側で「グループ作成」または「合言葉」の登録を先に行ってください。</p>`;
          return;
        }

        const groupId = userDoc.data().groupId;
        document.getElementById("group-tag").innerText = `GROUP · ${groupId}`;

        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'ja',
          height: '100%',
          handleWindowResize: true,
          headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
          dateClick: function (info) {
            updateTimeline(info.dateStr);
          }
        });
        calendar.render();

        firestore.collection("groups").doc(groupId).collection("assignments")
          .onSnapshot((snapshot) => {
            allAssignments = [];
            const events = [];

            snapshot.forEach((doc) => {
              const data = doc.data();
              const dateStr = getEventDate(data);
              if (!dateStr) return;

              allAssignments.push(data);
              events.push({
                title: data.subject || data.title || "予定",
                start: dateStr,
                allDay: true,
                color: '#E8590C'
              });
            });

            calendar.removeAllEvents();
            calendar.addEventSource(events);

            const todayStr = new Date().toISOString().split('T')[0];
            updateTimeline(todayStr);
          });

      }).catch(err => showFatalError("Firestoreからユーザー情報を取得できませんでした（" + err.message + "）"));
    }).catch(err => showFatalError("LIFFの起動に失敗しました（" + err.message + "）"));

    function updateTimeline(dateStr) {
      const titleEl = document.getElementById("selected-date-title");
      const listEl = document.getElementById("timeline-list");
      const badgeEl = document.getElementById("task-count-badge");

      const parts = dateStr.split("-");
      titleEl.innerText = `${parseInt(parts[1], 10)}月${parseInt(parts[2], 10)}日の課題`;

      const filtered = allAssignments.filter(item => getEventDate(item) === dateStr);
      badgeEl.innerText = `${filtered.length}件`;

      if (filtered.length === 0) {
        listEl.innerHTML = `<p class="text-xs text-center py-8" style="color: var(--ink-muted);">この日の締め切りはありません。</p>`;
        return;
      }

      listEl.innerHTML = "";
      filtered.forEach(item => {
        const timeLabel = getTimeLabel(item);
        const tag = item.subject || item.type || "未設定";

        const contentHtml = item.content
          ? `<p class="text-[11px] pt-1 line-clamp-2" style="color: var(--ink-muted);">${item.content}</p>`
          : "";

        const div = document.createElement("div");
        div.className = "bg-white border p-3 space-y-1";
        div.style.borderColor = "var(--line)";
        div.style.borderLeftWidth = "4px";
        div.style.borderLeftColor = "var(--orange)";

        div.innerHTML = `
          <div class="flex justify-between items-start gap-2">
            <span class="text-[10px] font-bold px-2 py-0.5 font-num" style="background: var(--orange-pale); color: var(--orange-deep);">${tag}</span>
            <span class="text-[11px] font-num font-bold shrink-0" style="color: var(--ink);">${timeLabel}</span>
          </div>
          <h3 class="text-sm font-bold pt-0.5">${item.title || "無題"}</h3>
          ${contentHtml}
        `;
        listEl.appendChild(div);
      });
    }
  </script>
</body>
</html>
