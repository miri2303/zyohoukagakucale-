<!-- LIFF / カレンダー表示側（HTML + JS） -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="theme-color" content="#E8590C">
  <title>課題カレンダー</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #FFFFFF;
      --bg-subtle: #FAF9F8;
      --ink: #1C1B1A;
      --ink-muted: #6B6B6B;
      --orange: #E8590C;
      --orange-deep: #C2410C;
      --line: #E6E2DD;
    }

    * { font-family: 'Zen Kaku Gothic New', -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif; }
    .font-num { font-family: 'JetBrains Mono', 'Zen Kaku Gothic New', monospace; }

    html, body { background: var(--bg); margin: 0; height: 100%; }

    /* FullCalendar: 四角基調・シンプル */
    .fc { font-size: 0.78rem !important; }
    .fc .fc-toolbar-title {
      font-size: 1rem !important; font-weight: 900; color: var(--ink);
    }
    .fc .fc-button {
      padding: 0.35rem 0.7rem !important;
      font-size: 0.72rem !important;
      background-color: #fff !important;
      color: var(--ink) !important;
      border: 1px solid var(--line) !important;
      border-radius: 4px !important;
      box-shadow: none !important;
    }
    .fc .fc-button:hover { background-color: #fff6f0 !important; border-color: var(--orange) !important; }
    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background-color: var(--orange) !important;
      border-color: var(--orange) !important;
      color: #fff !important;
      box-shadow: none !important;
    }
    .fc-theme-standard td, .fc-theme-standard th { border-color: var(--line) !important; }
    .fc-daygrid-day-number { color: var(--ink); font-weight: 700; }
    .fc-col-header-cell-cushion { color: var(--ink-muted); font-weight: 700; font-size: 0.68rem; }
    .fc-day-today { background-color: #fff6f0 !important; }
    .fc-daygrid-event {
      padding: 2px 6px !important;
      margin-top: 4px !important;
      font-size: 0.68rem !important;
      border-radius: 4px !important;
      line-height: 1.2 !important;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      background-color: var(--orange) !important;
      border: none !important;
      font-weight: 700;
    }

    /* レイアウト */
    body { display: flex; flex-direction: column; height: 100vh; color: var(--ink); }
    header { padding: 12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--line); background:var(--bg); }
    header h1 { margin:0; font-size:14px; font-weight:900; }
    header p { margin:0; font-size:11px; color:var(--ink-muted); }

    main { display:flex; flex-direction:column; flex:1; overflow:hidden; }
    .calendar-wrap { height:48%; padding:12px; border-bottom:1px solid var(--line); background:var(--bg); }
    .list-wrap { flex:1; padding:16px; background:var(--bg-subtle); overflow:auto; }

    .card { background:#fff; border:1px solid var(--line); padding:12px; border-left:6px solid var(--orange); border-radius:6px; }
    .tag { display:inline-block; padding:4px 8px; background:#fff6f0; color:var(--orange-deep); font-weight:700; font-size:11px; border-radius:4px; }
    .time { font-family:'JetBrains Mono', monospace; font-weight:700; color:var(--ink); font-size:12px; }

    .muted { color:var(--ink-muted); font-size:12px; }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>課題カレンダー</h1>
      <p id="group-tag" class="font-num">読み込み中</p>
    </div>
    <div class="font-num" style="font-size:11px; padding:6px 8px; border:1px solid var(--orange); color:var(--orange-deep); font-weight:700;">スマホ版</div>
  </header>

  <main>
    <div class="calendar-wrap">
      <div id="calendar" class="h-full"></div>
    </div>

    <div class="list-wrap">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h2 id="selected-date-title" class="muted" style="margin:0;">選択された日の課題</h2>
        <span id="task-count-badge" class="font-num" style="border:1px solid var(--orange); padding:4px 8px; color:var(--orange-deep); background:#fff; font-weight:700;">0件</span>
      </div>

      <div id="timeline-list" class="space-y-2">
        <p class="muted" style="text-align:center; padding:24px 0;">カレンダーの日付をタップすると、その日の課題が表示されます。</p>
      </div>
    </div>
  </main>

  <script>
    // Firebase設定（既存のトークンをそのまま使用）
    const firebaseConfig = {
      apiKey: "AIzaSyAFrehcz96W-wPS3-1ibSZpaPMefxHFHG0",
      authDomain: "zyohokagakucale.firebaseapp.com",
      projectId: "zyohokagakucale",
      storageBucket: "zyohokagakucale.firebasestorage.app",
      messagingSenderId: "261465620234",
      appId: "1:261465620234:web:673d61758162d9009f04f3",
      measurementId: "G-PW8S7FHC19"
    };
    firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();

    let allAssignments = [];

    function showFatalError(message) {
      document.body.innerHTML = `
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg);">
          <div style="max-width:360px; width:100%; border:1px solid var(--orange); padding:16px; background:#fff6f0; text-align:center;">
            <p style="font-weight:700; color:var(--orange-deep); margin:0 0 8px 0;">読み込みに失敗しました</p>
            <p style="color:var(--ink-muted); font-size:13px; margin:0;">${message}</p>
          </div>
        </div>`;
    }

    function getEventDate(item) {
      if (item.date) return item.date;
      if (item.deadline) return item.deadline.split(" ")[0];
      return null;
    }

    function getTimeLabel(item) {
      if (item.allDay) return "終日";
      if (item.startTime && item.endTime) return `${item.startTime}〜${item.endTime}`;
      if (item.startTime) return `${item.startTime}〜`;
      if (item.deadline) {
        const t = item.deadline.split(" ")[1];
        return t ? `${t} 締切` : "終日";
      }
      return "終日";
    }

    liff.init({ liffId: "2010567491-tcVJc1Jt" }).then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const userId = liff.getContext().userId;

      firestore.collection("users").doc(userId).get().then((userDoc) => {
        if (!userDoc.exists) {
          document.getElementById("timeline-list").innerHTML =
            `<p style="color:var(--orange-deep); text-align:center; padding:12px 0;">LINE側で「グループ作成」または合言葉の登録を先に行ってください。</p>`;
          return;
        }

        const groupId = userDoc.data().groupId;
        document.getElementById("group-tag").innerText = `GROUP · ${groupId}`;

        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'ja',
          height: '100%',
          handleWindowResize: true,
          headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
          dateClick: function (info) {
            updateTimeline(info.dateStr);
          }
        });
        calendar.render();

        firestore.collection("groups").doc(groupId).collection("assignments")
          .onSnapshot((snapshot) => {
            allAssignments = [];
            const events = [];

            snapshot.forEach((doc) => {
              const data = doc.data();
              const dateStr = getEventDate(data);
              if (!dateStr) return;

              // store id for later use if needed
              data._id = doc.id;
              allAssignments.push(data);
              events.push({
                title: data.subject || data.title || "予定",
                start: dateStr,
                allDay: true,
                color: '#E8590C'
              });
            });

            calendar.removeAllEvents();
            calendar.addEventSource(events);

            const todayStr = new Date().toISOString().split('T')[0];
            updateTimeline(todayStr);
          });

      }).catch(err => showFatalError("Firestoreからユーザー情報を取得できませんでした（" + err.message + "）"));
    }).catch(err => showFatalError("LIFFの起動に失敗しました（" + err.message + "）"));

    function updateTimeline(dateStr) {
      const titleEl = document.getElementById("selected-date-title");
      const listEl = document.getElementById("timeline-list");
      const badgeEl = document.getElementById("task-count-badge");

      const parts = dateStr.split("-");
      titleEl.innerText = `${parseInt(parts[1], 10)}月${parseInt(parts[2], 10)}日の課題`;

      const filtered = allAssignments.filter(item => getEventDate(item) === dateStr);
      badgeEl.innerText = `${filtered.length}件`;

      if (filtered.length === 0) {
        listEl.innerHTML = `<p class="muted" style="text-align:center; padding:32px 0;">この日の締め切りはありません。</p>`;
        return;
      }

      listEl.innerHTML = "";
      filtered.forEach(item => {
        const timeLabel = getTimeLabel(item);
        const tag = item.subject || item.type || "未設定";

        const contentHtml = item.content
          ? `<p style="color:var(--ink-muted); font-size:13px; margin-top:6px; line-height:1.4;">${escapeHtml(item.content)}</p>`
          : "";

        const div = document.createElement("div");
        div.className = "card";
        div.style.marginBottom = "10px";

        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
            <span class="tag">${escapeHtml(tag)}</span>
            <span class="time">${escapeHtml(timeLabel)}</span>
          </div>
          <h3 style="margin:8px 0 0 0; font-weight:700; font-size:15px;">${escapeHtml(item.title || "無題")}</h3>
          ${contentHtml}
        `;
        listEl.appendChild(div);
      });
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>"'`=\/]/g, function(s) {
        return ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
          '/': '&#x2F;',
          '`': '&#x60;',
          '=': '&#x3D;'
        })[s];
      });
    }
  </script>
</body>
</html>
