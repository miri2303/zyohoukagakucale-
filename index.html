<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課題カレンダー</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <div class="p-4 max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-4">
      <h1 class="text-xl font-bold text-green-600">📅 課題ダッシュボード</h1>
      <span id="group-tag" class="bg-gray-200 text-xs px-2 py-1 rounded">読込中...</span>
    </header>
    
    <div id="calendar" class="bg-white p-4 rounded-xl shadow-md"></div>
  </div>

  <script>
    // 💡 1. Firebaseの初期設定（自分のコンソールの値に変えてね）
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 💡 2. LIFFの初期化とデータのリアルタイム読み込み
    liff.init({ liffId: "YOUR_LIFF_ID" }).then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      
      const context = liff.getContext();
      const userId = context.userId; // LINEのユーザーIDを取得

      // ユーザーの所属グループをFirestoreから検索
      db.collection("users").doc(userId).get().then((userDoc) => {
        if (!userDoc.exists) {
          alert("⚠️ グループ情報が見つかりません。\nLINEトーク画面で「グループ作成」を行うか、既存のグループに参加してから再度開いてください。");
          return;
        }
        
        const groupId = userDoc.data().groupId;
        document.getElementById("group-tag").innerText = `グループ合言葉: ${groupId}`;

        // カレンダーの初期化
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'ja',
          events: []
        });
        calendar.render();

        // 💡 修正箇所：.document() を .doc() に修正し、エラーハンドリングを追加
        db.collection("groups").doc(groupId).collection("assignments")
          .onSnapshot((snapshot) => {
            const events = [];
            snapshot.forEach((doc) => {
              const data = doc.data();
              events.push({
                title: `[${data.subject}] ${data.title}`,
                start: data.deadline.split(" ")[0], 
                color: '#e11d48' 
              });
            });
            calendar.removeAllEvents();
            calendar.addEventSource(events);
          }, (error) => {
            alert("Firestore読み込みエラー: " + error.message);
          });

      }).catch((err) => {
        alert("ユーザーデータ取得失敗: " + err.message);
      });
    }).catch((err) => {
      alert("LIFFの起動に失敗しました: " + err.message);
    });
  </script>
</body>
</html>
