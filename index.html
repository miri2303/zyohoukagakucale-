<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#E8590C" />
  <title>課題カレンダー</title>

  <!-- フォント -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- LIFF / Firebase -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg: #FFFFFF;
      --bg-subtle: #FAF9F8;
      --ink: #1C1B1A;
      --muted: #6B6B6B;
      --orange: #E8590C;
      --orange-deep: #C2410C;
      --line: #E6E2DD;
    }

    * { box-sizing: border-box; }
    html,body { height:100%; margin:0; background:var(--bg); -webkit-text-size-adjust:100%; }
    body { font-family: 'Zen Kaku Gothic New', system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; color:var(--ink); font-size:clamp(14px, 3.2vw, 16px); }

    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; border-bottom:1px solid var(--line);
      background:var(--bg);
    }
    header h1 { margin:0; font-weight:900; font-size:1rem; }
    header p { margin:0; color:var(--muted); font-size:0.9rem; }

    main { display:flex; flex-direction:column; height:calc(100vh - 56px); overflow:hidden; }

    /* カレンダーが画面の大部分を占める */
    .calendar-wrap { 
      flex:1; 
      padding:8px 12px; 
      background:var(--bg); 
      overflow:auto;
      display:flex;
      flex-direction:column;
    }

    /* FullCalendar 調整 */
    .fc { 
      font-size:0.95rem; 
      flex:1;
      display:flex;
      flex-direction:column;
    }
    .fc .fc-col-header-cell { padding:8px 2px; }
    .fc .fc-daygrid-day-number { font-weight:800; color:var(--ink); padding:4px 2px; }
    .fc .fc-toolbar-title { font-weight:900; font-size:1.05rem; }
    .fc .fc-button {
      padding:6px 8px; font-size:0.85rem; border-radius:6px;
      background:#fff; color:var(--ink); border:1px solid var(--line);
      box-shadow:none;
    }
    .fc .fc-button:hover { background:#fff6f0; border-color:var(--orange); }
    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background:var(--orange); color:#fff; border-color:var(--orange);
    }

    /* 日セル */
    .fc .fc-daygrid-day-frame { 
      min-height:100px; 
      padding:4px; 
      display:flex;
      flex-direction:column;
    }

    /* イベントを横棒で表示 */
    .fc .fc-daygrid-day-events { 
      display:flex;
      flex-direction:column;
      gap:3px;
      flex:1;
      overflow:hidden;
    }

    .fc .fc-daygrid-event {
      border-radius:4px;
      padding:2px 4px;
      font-weight:700;
      font-size:0.7rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      background:var(--orange);
      border:none;
      color:#fff;
      line-height:1.2;
      height:auto;
      max-height:16px;
    }

    .fc .fc-daygrid-day.fc-day-other { background:#fafafa; opacity:0.5; }
    .fc .fc-daygrid-day.fc-day-today { background:#fff9f6; }

    /* 読み込み表示 */
    .loading { 
      position:fixed; 
      left:50%; top:50%; 
      transform:translate(-50%,-50%); 
      background:#fff; 
      border:1px solid var(--line); 
      padding:10px 14px; 
      border-radius:8px; 
      box-shadow:0 6px 18px rgba(0,0,0,0.06); 
      display:none; 
      z-index:9999; 
    }

    @media (max-width:768px) {
      .fc .fc-daygrid-day-frame { min-height:80px; }
      .fc .fc-daygrid-event { font-size:0.65rem; }
    }

    @media (max-width:420px) {
      .fc .fc-daygrid-day-frame { min-height:70px; }
      .fc .fc-daygrid-event { font-size:0.6rem; }
      header { padding:10px 12px; }
      header h1 { font-size:0.95rem; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>課題カレンダー</h1>
      <p id="group-tag">読み込み中</p>
    </div>
    <div style="font-family: 'JetBrains Mono', monospace; font-weight:700; font-size:0.85rem; color:var(--orange-deep); border:1px solid var(--orange); padding:6px 8px; border-radius:6px;">スマホ版</div>
  </header>

  <main>
    <div class="calendar-wrap">
      <div id="calendar"></div>
    </div>
  </main>

  <div class="loading" id="loading">読み込み中…</div>

  <script>
    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyAFrehcz96W-wPS3-1ibSZpaPMefxHFHG0",
      authDomain: "zyohokagakucale.firebaseapp.com",
      projectId: "zyohokagakucale",
      storageBucket: "zyohokagakucale.firebasestorage.app",
      messagingSenderId: "261465620234",
      appId: "1:261465620234:web:673d61758162d9009f04f3",
      measurementId: "G-PW8S7FHC19"
    };
    firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();

    // 内部状態
    let allAssignments = [];
    let pendingSnapshotTimer = null;
    let latestSnapshot = null;
    let calendar = null;
    const loadingEl = document.getElementById('loading');

    function showLoading(flag) { loadingEl.style.display = flag ? 'block' : 'none'; }

    function getEventDate(item) {
      if (!item) return null;
      if (item.date) return item.date;
      if (item.deadline) return item.deadline.split(' ')[0];
      return null;
    }

    function getTimeLabel(item) {
      if (!item) return '';
      if (item.allDay) return '終日';
      if (item.startTime && item.endTime) return `${item.startTime}〜${item.endTime}`;
      if (item.startTime) return `${item.startTime}〜`;
      if (item.deadline) {
        const t = item.deadline.split(' ')[1];
        return t ? `${t} 締切` : '終日';
      }
      return '終日';
    }

    // スナップショットのデバウンス
    function scheduleSnapshotUpdate(snapshot) {
      latestSnapshot = snapshot;
      if (pendingSnapshotTimer) clearTimeout(pendingSnapshotTimer);
      pendingSnapshotTimer = setTimeout(() => {
        applySnapshot(latestSnapshot);
        pendingSnapshotTimer = null;
        latestSnapshot = null;
      }, 220);
    }

    // スナップショットを適用：イベント配列を作る
    function applySnapshot(snapshot) {
      showLoading(true);
      const events = [];
      const assignments = [];

      snapshot.forEach(doc => {
        const data = doc.data();
        const dateStr = getEventDate(data);
        if (!dateStr) return;
        data._id = doc.id;
        assignments.push(data);

        // FullCalendar 用イベント
        const subject = data.subject || data.type || '予定';
        const title = data.title || '無題';
        const displayTitle = `${subject}: ${title}`;

        events.push({
          id: data._id,
          title: displayTitle,
          start: dateStr,
          allDay: true,
          extendedProps: { raw: data }
        });
      });

      allAssignments = assignments;

      // カレンダーのイベントを差分更新
      calendar.removeAllEvents();
      calendar.addEventSource(events);
      calendar.render();

      // UX: 少し遅延してローディングを消す
      setTimeout(() => showLoading(false), 120);
    }

    // カレンダー初期化
    function initCalendar() {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        height: 'auto',
        contentHeight: 'auto',
        handleWindowResize: true,
        headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
        dayMaxEventRows: 5,
        dayMaxEvents: true,
        eventDisplay: 'block',
        eventClick: function(info) {
          const raw = info.event.extendedProps.raw || {};
          showDetail(raw);
        }
      });
      calendar.render();
    }

    function showDetail(raw) {
      const timeLabel = getTimeLabel(raw);
      const subject = raw.subject || raw.type || '未設定';
      const title = raw.title || '無題';
      const msg = `【${subject}】\n${title}\n${timeLabel}`;
      showTemporaryNotice(msg);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"'`=\/]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','/':'&#x2F;','`':'&#x60;','=':'&#x3D;'})[s]);
    }

    // 簡易通知
    function showTemporaryNotice(msg) {
      const el = document.createElement('div');
      el.style.position = 'fixed'; 
      el.style.left = '50%'; 
      el.style.bottom = '20px'; 
      el.style.transform = 'translateX(-50%)';
      el.style.background = '#fff'; 
      el.style.border = '1px solid var(--line)'; 
      el.style.padding = '12px 14px'; 
      el.style.borderRadius = '8px';
      el.style.boxShadow = '0 4px 12px rgba(0,0,0,0.08)'; 
      el.style.zIndex = '9999'; 
      el.style.maxWidth = '90vw';
      el.style.whiteSpace = 'pre-wrap';
      el.style.wordBreak = 'break-word';
      el.innerText = msg;
      document.body.appendChild(el);
      setTimeout(()=>{ el.style.transition='opacity 300ms'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2200);
    }

    // 初期化と Firestore 購読
    (function bootstrap(){
      initCalendar();
      showLoading(true);

      // LIFF 初期化
      liff.init({ liffId: "2010567491-tcVJc1Jt" }).then(() => {
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const userId = liff.getContext().userId;

        // ユーザー情報取得
        firestore.collection('users').doc(userId).get().then(userDoc => {
          if (!userDoc.exists) {
            showLoading(false);
            document.getElementById('group-tag').innerText = 'エラー: グループ登録が必要です';
            return;
          }
          const groupId = userDoc.data().groupId || '';
          document.getElementById('group-tag').innerText = `GROUP · ${groupId}`;

          // assignments コレクションを購読
          firestore.collection('groups').doc(groupId).collection('assignments')
            .onSnapshot(snapshot => scheduleSnapshotUpdate(snapshot), err => {
              showLoading(false);
              document.getElementById('group-tag').innerText = `エラー: ${err.message}`;
            });
        }).catch(err => {
          showLoading(false);
          document.getElementById('group-tag').innerText = `エラー: ${err.message}`;
        });
      }).catch(err => {
        showLoading(false);
        document.getElementById('group-tag').innerText = `LIFF エラー: ${err.message}`;
      });
    })();
  </script>
</body>
</html>
