<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#E8590C" />
  <title>課題カレンダー</title>

  <!-- フォント -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- LIFF / Firebase -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root{
      --bg: #FFFFFF;
      --bg-subtle: #FAF9F8;
      --ink: #1C1B1A;
      --muted: #6B6B6B;
      --orange: #E8590C;
      --orange-deep: #C2410C;
      --line: #E6E2DD;
    }

    * { box-sizing: border-box; }
    html,body { height:100%; margin:0; background:var(--bg); -webkit-text-size-adjust:100%; }
    body { font-family: 'Zen Kaku Gothic New', system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; color:var(--ink); font-size:clamp(14px, 3.2vw, 16px); }

    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; border-bottom:1px solid var(--line);
      background:var(--bg);
    }
    header h1 { margin:0; font-weight:900; font-size:1rem; }
    header p { margin:0; color:var(--muted); font-size:0.9rem; }

    main { display:flex; flex-direction:column; height:calc(100vh - 56px); overflow:hidden; }

    /* カレンダーと下部リストを同等配分 */
    .calendar-wrap { 
      flex:1; 
      padding:8px 12px; 
      background:var(--bg); 
      overflow:auto;
      display:flex;
      flex-direction:column;
      border-bottom:1px solid var(--line);
    }

    .list-wrap { 
      flex:1; 
      padding:12px; 
      background:var(--bg-subtle); 
      overflow:auto;
      display:flex;
      flex-direction:column;
    }

    /* FullCalendar 調整 */
    .fc { 
      font-size:0.95rem; 
      flex:1;
      display:flex;
      flex-direction:column;
    }
    .fc .fc-col-header-cell { padding:8px 2px; }
    .fc .fc-daygrid-day-number { font-weight:800; color:var(--ink); padding:4px 2px; }
    .fc .fc-toolbar-title { font-weight:900; font-size:1.05rem; }
    .fc .fc-button {
      padding:6px 8px; font-size:0.85rem; border-radius:6px;
      background:#fff; color:var(--ink); border:1px solid var(--line);
      box-shadow:none;
    }
    .fc .fc-button:hover { background:#fff6f0; border-color:var(--orange); }
    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background:var(--orange); color:#fff; border-color:var(--orange);
    }

    /* 日セル */
    .fc .fc-daygrid-day-frame { 
      min-height:90px; 
      padding:4px; 
      display:flex;
      flex-direction:column;
    }

    /* イベントを横棒で表示 */
    .fc .fc-daygrid-day-events { 
      display:flex;
      flex-direction:column;
      gap:3px;
      flex:1;
      overflow:hidden;
    }

    .fc .fc-daygrid-event {
      border-radius:4px;
      padding:3px 5px;
      font-weight:700;
      font-size:0.7rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      background:var(--orange);
      border:none;
      color:#fff;
      line-height:1.3;
      height:auto;
      max-height:18px;
      cursor:pointer;
      transition:all 150ms;
    }

    .fc .fc-daygrid-event:hover {
      background:var(--orange-deep);
      box-shadow:0 2px 8px rgba(232, 89, 12, 0.3);
    }

    .fc .fc-daygrid-day.fc-day-other { background:#fafafa; opacity:0.5; }
    .fc .fc-daygrid-day.fc-day-today { background:#fff9f6; }
    .fc .fc-daygrid-day { cursor:pointer; }

    /* リスト側 */
    .selected-date-title { 
      color:var(--muted); 
      margin:0 0 10px 0; 
      font-weight:700; 
      font-size:0.95rem;
    }

    .timeline-list { 
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow-y:auto;
    }

    .task-card { 
      background:#fff; 
      border:1px solid var(--line); 
      padding:10px; 
      border-left:6px solid var(--orange); 
      border-radius:8px;
      cursor:pointer;
      transition:all 150ms;
    }

    .task-card:hover {
      border-color:var(--orange);
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }

    .task-title { font-weight:800; margin:6px 0 0 0; }
    .task-meta { color:var(--muted); font-size:0.9rem; margin-top:6px; }
    .task-subject {
      font-weight:800;
      color:var(--orange-deep);
      background:#fff6f0;
      padding:4px 6px;
      border-radius:4px;
      font-size:0.85rem;
      display:inline-block;
      margin-bottom:4px;
    }

    .empty-state {
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
    }

    /* 読み込み表示 */
    .loading { 
      position:fixed; 
      left:50%; top:50%; 
      transform:translate(-50%,-50%); 
      background:#fff; 
      border:1px solid var(--line); 
      padding:10px 14px; 
      border-radius:8px; 
      box-shadow:0 6px 18px rgba(0,0,0,0.06); 
      display:none; 
      z-index:9999; 
    }

    @media (max-width:768px) {
      .fc .fc-daygrid-day-frame { min-height:80px; }
      .fc .fc-daygrid-event { font-size:0.65rem; }
    }

    @media (max-width:420px) {
      .fc .fc-daygrid-day-frame { min-height:70px; }
      .fc .fc-daygrid-event { font-size:0.6rem; }
      header { padding:10px 12px; }
      header h1 { font-size:0.95rem; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>課題カレンダー</h1>
      <p id="group-tag">読み込み中</p>
    </div>
    <div style="font-family: 'JetBrains Mono', monospace; font-weight:700; font-size:0.85rem; color:var(--orange-deep); border:1px solid var(--orange); padding:6px 8px; border-radius:6px;">スマホ版</div>
  </header>

  <main>
    <div class="calendar-wrap">
      <div id="calendar"></div>
    </div>

    <div class="list-wrap">
      <h2 id="selected-date-title" class="selected-date-title">日付を選択してください</h2>
      <div id="timeline-list" class="timeline-list">
        <p class="empty-state">カレンダーの日付をタップするか、予定をタップすると詳細が表示されます。</p>
      </div>
    </div>
  </main>

  <div class="loading" id="loading">読み込み中…</div>

  <script>
    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyAFrehcz96W-wPS3-1ibSZpaPMefxHFHG0",
      authDomain: "zyohokagakucale.firebaseapp.com",
      projectId: "zyohokagakucale",
      storageBucket: "zyohokagakucale.firebasestorage.app",
      messagingSenderId: "261465620234",
      appId: "1:261465620234:web:673d61758162d9009f04f3",
      measurementId: "G-PW8S7FHC19"
    };
    firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();

    // 内部状態
    let allAssignments = [];
    let pendingSnapshotTimer = null;
    let latestSnapshot = null;
    let calendar = null;
    let selectedDateStr = null;
    const loadingEl = document.getElementById('loading');

    function showLoading(flag) { loadingEl.style.display = flag ? 'block' : 'none'; }

    function getEventDate(item) {
      if (!item) return null;
      if (item.date) return item.date;
      if (item.deadline) return item.deadline.split(' ')[0];
      return null;
    }

    function getTimeLabel(item) {
      if (!item) return '';
      if (item.allDay) return '終日';
      if (item.startTime && item.endTime) return `${item.startTime}〜${item.endTime}`;
      if (item.startTime) return `${item.startTime}〜`;
      if (item.deadline) {
        const t = item.deadline.split(' ')[1];
        return t ? `${t} 締切` : '終日';
      }
      return '終日';
    }

    // スナップショットのデバウンス
    function scheduleSnapshotUpdate(snapshot) {
      latestSnapshot = snapshot;
      if (pendingSnapshotTimer) clearTimeout(pendingSnapshotTimer);
      pendingSnapshotTimer = setTimeout(() => {
        applySnapshot(latestSnapshot);
        pendingSnapshotTimer = null;
        latestSnapshot = null;
      }, 220);
    }

    // スナップショットを適用
    function applySnapshot(snapshot) {
      showLoading(true);
      const events = [];
      const assignments = [];

      snapshot.forEach(doc => {
        const data = doc.data();
        const dateStr = getEventDate(data);
        if (!dateStr) return;
        data._id = doc.id;
        assignments.push(data);

        // FullCalendar 用イベント
        const subject = data.subject || data.type || '予定';
        const title = data.title || '無題';
        const displayTitle = `${subject}: ${title}`;

        events.push({
          id: data._id,
          title: displayTitle,
          start: dateStr,
          allDay: true,
          extendedProps: { raw: data }
        });
      });

      allAssignments = assignments;

      // カレンダーのイベントを差分更新
      calendar.removeAllEvents();
      calendar.addEventSource(events);
      calendar.render();

      // 選択中の日付があれば再表示
      if (selectedDateStr) {
        updateTimeline(selectedDateStr);
      }

      setTimeout(() => showLoading(false), 120);
    }

    // 日付を選択したときのリスト表示
    function updateTimeline(dateStr) {
      selectedDateStr = dateStr;
      const titleEl = document.getElementById('selected-date-title');
      const listEl = document.getElementById('timeline-list');
      const parts = dateStr.split('-');
      const month = parseInt(parts[1], 10);
      const day = parseInt(parts[2], 10);
      titleEl.innerText = `${month}月${day}日の課題`;

      const filtered = allAssignments.filter(item => getEventDate(item) === dateStr);
      if (!filtered || filtered.length === 0) {
        listEl.innerHTML = `<p class="empty-state">この日の締め切りはありません。</p>`;
        return;
      }

      listEl.innerHTML = '';
      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'task-card';

        const timeLabel = getTimeLabel(item);
        const subject = item.subject || item.type || '未設定';
        const title = item.title || '無題';
        const content = item.content || '';

        card.innerHTML = `
          <div class="task-subject">${escapeHtml(subject)}</div>
          <div class="task-title">${escapeHtml(title)}</div>
          ${content ? `<div class="task-meta">${escapeHtml(content)}</div>` : ''}
          <div class="task-meta" style="margin-top:4px;font-family:'JetBrains Mono',monospace;">${escapeHtml(timeLabel)}</div>
        `;
        listEl.appendChild(card);
      });

      listEl.scrollTop = 0;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"'`=\/]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','/':'&#x2F;','`':'&#x60;','=':'&#x3D;'})[s]);
    }

    // カレンダー初期化
    function initCalendar() {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        height: 'auto',
        contentHeight: 'auto',
        handleWindowResize: true,
        headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
        dayMaxEventRows: 5,
        dayMaxEvents: true,
        eventDisplay: 'block',
        // 日付クリック時
        dateClick: function(info) {
          const dateStr = info.dateStr;
          updateTimeline(dateStr);
        },
        // イベントクリック時（日付選択とリスト表示）
        eventClick: function(info) {
          const dateStr = info.event.startStr;
          updateTimeline(dateStr);
        }
      });
      calendar.render();
    }

    // 初期化と Firestore 購読
    (function bootstrap(){
      initCalendar();
      showLoading(true);

      // LIFF 初期化
      liff.init({ liffId: "2010567491-tcVJc1Jt" }).then(() => {
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const userId = liff.getContext().userId;

        // ユーザー情報取得
        firestore.collection('users').doc(userId).get().then(userDoc => {
          if (!userDoc.exists) {
            showLoading(false);
            document.getElementById('group-tag').innerText = 'エラー: グループ登録が必要です';
            return;
          }
          const groupId = userDoc.data().groupId || '';
          document.getElementById('group-tag').innerText = `GROUP · ${groupId}`;

          // assignments コレクションを購読
          firestore.collection('groups').doc(groupId).collection('assignments')
            .onSnapshot(snapshot => scheduleSnapshotUpdate(snapshot), err => {
              showLoading(false);
              document.getElementById('group-tag').innerText = `エラー: ${err.message}`;
            });
        }).catch(err => {
          showLoading(false);
          document.getElementById('group-tag').innerText = `エラー: ${err.message}`;
        });
      }).catch(err => {
        showLoading(false);
        document.getElementById('group-tag').innerText = `LIFF エラー: ${err.message}`;
      });
    })();
  </script>
</body>
</html>
